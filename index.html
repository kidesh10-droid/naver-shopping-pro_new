<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>네이버 쇼핑 분석 Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
:root{
  --green:#03C75A;--gd:#02a34a;--gl:#e8f9ef;
  --blue:#1976D2;--red:#D84315;--orange:#F57C00;--purple:#7B1FA2;
  --bg:#f5f6f8;--card:#fff;--bd:#e2e5ea;
  --t:#1a1a2e;--t2:#6b7280;--t3:#9ca3af;
  --gold:#F59E0B;--silver:#94A3B8;--bronze:#B45309;
  --r:12px;--rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;}
#mainScreen{display:block;padding:24px 16px;}
.w{max-width:980px;margin:0 auto;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.logo{width:44px;height:44px;background:var(--green);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;}
.hdr h1{font-size:20px;font-weight:700;}
.hdr p{font-size:13px;color:var(--t2);margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.usage-badge{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--gl);color:#0a6b2e;font-weight:500;}
.logout-btn{font-size:13px;color:var(--t2);cursor:pointer;padding:4px 10px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--card);}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:4px;}
.tab{flex:1;padding:11px;text-align:center;font-size:14px;font-weight:500;border-radius:var(--rs);cursor:pointer;color:var(--t2);border:none;background:none;font-family:'Noto Sans KR',sans-serif;transition:all .2s;}
.tab.active{background:var(--green);color:#fff;}
.tc{display:none;}.tc.on{display:block;}
.card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.row{display:flex;gap:8px;margin-bottom:12px;}
.iw{flex:1;display:flex;flex-direction:column;gap:4px;}
.il{font-size:12px;color:var(--t2);font-weight:500;}
input[type=text],input[type=number],select{height:42px;border:1.5px solid var(--bd);border-radius:var(--rs);padding:0 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--t);background:#fafafa;outline:none;width:100%;}
input:focus,select:focus{border-color:var(--green);background:#fff;}
.opts{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.btn{height:42px;padding:0 24px;border:none;border-radius:var(--rs);font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;white-space:nowrap;}
.bg{background:var(--green);color:#fff;}
.bb{background:var(--blue);color:#fff;}
.bp{background:var(--purple);color:#fff;}
.err{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r);padding:14px 18px;font-size:13px;color:#b91c1c;margin-bottom:16px;display:none;}
.err.on{display:block;}
.prog{display:none;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:16px;}
.prog.on{display:block;}
.ph{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.spin{width:18px;height:18px;border:2.5px solid var(--gl);border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0;}
@keyframes sp{to{transform:rotate(360deg);}}
.sim-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;}
.sim-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:18px;text-align:center;}
.sim-icon{font-size:28px;margin-bottom:8px;}
.sim-lbl{font-size:12px;color:var(--t2);margin-bottom:6px;}
.sim-val{font-size:24px;font-weight:700;}
.sim-val.g{color:var(--green);}.sim-val.b{color:var(--blue);}.sim-val.o{color:var(--orange);}
.sim-sub{font-size:11px;color:var(--t3);margin-top:4px;}
.sec{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:16px;}
.sechd{padding:12px 18px;border-bottom:1px solid var(--bd);background:#fafafa;display:flex;align-items:center;justify-content:space-between;}
.sect{font-size:14px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;color:var(--t3);font-weight:500;padding:8px 18px;text-align:left;border-bottom:1px solid var(--bd);background:#fafafa;}
td{padding:10px 18px;font-size:13px;border-bottom:1px solid var(--bd);}
@media(max-width:640px){ .row{flex-direction:column;} .sim-grid{grid-template-columns:repeat(2,1fr);} }
</style>
</head>
<body>

<div id="mainScreen">
<div class="w">
  <div class="hdr">
    <div class="hdr-left">
      <div class="logo">📊</div>
      <div>
        <h1>네이버 쇼핑 분석 Pro</h1>
        <p>순위 · 키워드 · 광고 · 트렌드 분석</p>
      </div>
    </div>
    <div class="hdr-right">
      <span id="usageBadge" class="usage-badge">🎉 베타 무료 이용 중</span>
      <button class="logout-btn" id="loginBtn">로그인 / 회원가입</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab" onclick="sw('rank')">🏆 순위 확인</button>
    <button class="tab" onclick="sw('kw')">🔍 키워드 분석</button>
    <button class="tab" onclick="sw('hot')">🔥 급상승 키워드</button>
    <button class="tab active" onclick="sw('sim')">💰 광고 시뮬레이터</button>
  </div>

  <div class="tc on" id="tc-sim">
    <div class="card">
      <div class="row">
        <div class="iw"><span class="il">키워드</span><input type="text" id="sKw" placeholder="예: 블루투스 이어폰" /></div>
        <div class="iw"><span class="il">일 예산 (원)</span><input type="number" id="sBudget" value="100000" /></div>
        <div class="iw"><span class="il">희망 입찰가 (원)</span><input type="number" id="sBid" placeholder="미입력 시 평균가 적용" /></div>
      </div>
      <div class="opts">
        <div class="ow"><span class="il">디바이스</span>
          <select id="sDev"><option value="pc">PC</option><option value="mobile" selected>모바일</option></select>
        </div>
        <button class="btn bp" id="btnS" onclick="startSim()">시뮬레이션 시작</button>
      </div>
    </div>

    <div class="err" id="sErr"></div>
    
    <div class="prog" id="sProg">
      <div class="ph"><div class="spin"></div><div><div class="pt">Gemini AI 분석 중...</div><div class="ps">입찰가 대비 예상 순위 및 노출량 추정 중</div></div></div>
    </div>

    <div class="sr" id="sRes" style="display:none;">
      <div class="sim-grid" id="simGrid"></div>
      <div class="sec" id="simSec"></div>
    </div>
  </div>
</div>
</div>

<script>
// 기본 유틸 함수
function v(id){return document.getElementById(id).value.trim();}
function enc(s){return encodeURIComponent(s);}
function sh(id){document.getElementById(id).style.display = 'block';}
function hi(id){document.getElementById(id).style.display = 'none';}
function sw(t) {
  ['rank','kw','hot','sim'].forEach((id) => {
    document.getElementById('tc-'+id).classList.toggle('on', t===id);
  });
}

// ===== 광고 시뮬레이터 로직 =====
async function startSim() {
  const kw = v('sKw'), budget = v('sBudget'), dev = v('sDev'), bid = v('sBid');
  if (!kw) { alert('키워드를 입력해주세요.'); return; }
  
  document.getElementById('sErr').style.display = 'none';
  sh('sProg'); hi('sRes');

  try {
    // API 호출 시 bid(입찰가) 파라미터 추가
    const res = await fetch(`/api/simulate?keyword=${enc(kw)}&budget=${budget}&device=${dev}&bid=${bid}`);
    const data = await res.json();
    
    if (data.errorMessage) throw new Error(data.errorMessage);
    
    renderSim(kw, budget, dev, data);
  } catch(e) { 
    const errEl = document.getElementById('sErr');
    errEl.textContent = '오류: ' + e.message;
    errEl.style.display = 'block';
  } finally { 
    hi('sProg'); 
  }
}

function renderSim(kw, budget, dev, data) {
  const compColor = data.compColor || '#e53e3e';

  // [수정] 6칸 그리드: 검색량, 입찰가, 예상 순위, 클릭수, 노출수, 예산 추정
  document.getElementById('simGrid').innerHTML = `
    <div class="sim-card"><div class="sim-icon">🔍</div><div class="sim-lbl">월간 총 검색량</div><div class="sim-val g">${(data.totalQcCnt || 0).toLocaleString()}</div><div class="sim-sub">쇼핑 수요 지수</div></div>
    <div class="sim-card"><div class="sim-icon">💰</div><div class="sim-lbl">적용 입찰가(CPC)</div><div class="sim-val o">${(data.cpc || 0).toLocaleString()}원</div><div class="sim-sub">희망 또는 평균가</div></div>
    <div class="sim-card"><div class="sim-icon">🏆</div><div class="sim-lbl">예상 평균 순위</div><div class="sim-val" style="color:var(--blue); font-size:22px;">${data.estRank || '분석 중'}</div><div class="sim-sub">현재 입찰가 기준</div></div>
    <div class="sim-card"><div class="sim-icon">👆</div><div class="sim-lbl">예상 일 클릭수</div><div class="sim-val b">${(data.estClicks || 0).toLocaleString()}회</div><div class="sim-sub">일 예산 내 확보가능</div></div>
    <div class="sim-card"><div class="sim-icon">👁️</div><div class="sim-lbl">예상 노출수</div><div class="sim-val p">${(data.estImpressions || 0).toLocaleString()}</div><div class="sim-sub">쇼핑 구좌 가중치 반영</div></div>
    <div class="sim-card"><div class="sim-icon">📈</div><div class="sim-lbl">월간 예산 추정</div><div class="sim-val" style="color:var(--purple)">${(data.recommendedMonthly || 0).toLocaleString()}원~</div><div class="sim-sub">한 달 운영 시 예상 비용</div></div>
  `;

  // 리스트 결과 업데이트
  const rows = (data.related || []).map(r => {
    return `<tr>
      <td style="font-weight:500">${r.keyword}</td>
      <td>${(r.totalQcCnt || 0).toLocaleString()}</td>
      <td style="font-weight:700; color:var(--blue)">${r.estRank || '중상위'}</td>
      <td style="font-weight:700; color:var(--green)">${(r.cpcAvg || data.cpc).toLocaleString()}원</td>
      <td><span style="color:#e53e3e; font-weight:700">레드오션</span></td>
    </tr>`;
  }).join('');

  document.getElementById('simSec').innerHTML = `
    <div class="sechd"><span class="sect">키워드별 실무 추정 데이터</span><span class="secs">AI 시뮬레이션 결과</span></div>
    <table><thead><tr><th>키워드</th><th>월 검색량</th><th>예상 순위</th><th>평균 CPC</th><th>경쟁도</th></tr></thead>
    <tbody>${rows}</tbody></table>`;

  sh('sRes');
}

document.getElementById('sKw').addEventListener('keydown',e=>{if(e.key==='Enter')startSim();});
</script>
</body>
</html>
